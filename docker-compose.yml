services:
  bot:
    build: .
    image: cookbot:v1
    container_name: cookbot
    env_file: .env
    restart: unless-stopped
    command: python bot.py

  scheduler:
    build: .
    image: cookbot:v1
    container_name: cookbot-scheduler
    env_file: .env
    restart: unless-stopped
    command: python scheduler.py